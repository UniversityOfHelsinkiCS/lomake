name: Test feature branch

on:
  pull_request:
    branches: ['master']
jobs:
  if: ${{ github.event.pull_request.user.login != 'renovate' }}
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - name: Build project for linting
        run: npm ci
      - name: Run eslint and ts checks
        run: npm run lint

  translations:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - name: Build project for translations
        run: npm ci
      - name: Analyse translations
        run: npm run translations -- --lang fi,en

  tests:
    strategy:
      fail-fast: false
      matrix:
        spec:
          [
            IAMpermissions1,
            IAMpermissions2,
            management,
            ospa,
            permissions,
            textfield,
            overview,
            intervention,
          ]
    name: Run tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
 
      - name: npm ci
        run: npm ci --no-audit --no-fund

      - name: docker compose up -d
        run: docker compose up -d

      - name: seed db
        run: docker exec lomake_dev sh -c "npm run seed"

      - name: Run cypress tests with retry
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 6
          max_attempts: 2
          command: ./node_modules/.bin/cypress run --headless --browser chrome --spec "cypress/integration/${{ matrix.spec }}.spec.js"

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: Cypress videos
          path: /home/runner/work/lomake/lomake/cypress/videos
